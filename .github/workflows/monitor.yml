name: SQ42 Monitor

on:
  schedule:
    - cron: '*/5 * * * *'   # toutes les 5 minutes
  workflow_dispatch:          # déclenchement manuel possible

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # nécessaire pour commit + push du state
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python sq42_monitor.py

      - name: Commit updated state
        run: |
          git config user.name "sq42-monitor[bot]"
          git config user.email "sq42-monitor@users.noreply.github.com"
          git add sq42_state.json
          git diff --staged --quiet || git commit -m "chore: update state [skip ci]" && git push
